spring:
  mvc:
    problemdetails:
      enabled: true

  datasource:
    url: jdbc:mysql://localhost:3306/db_bookrental
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: 0
  forward-headers-strategy: framework

eureka:
  instance:
    instance-id: ${spring.application.name}:${random.value}

app:
  storage:
    path: ${user.home}/.ijse/eca/books