
spring:
  application:
    name: BOOK-SERVICE

  mvc:
    problemdetails:
      enabled: true

  datasource:
    url: jdbc:mysql://localhost:14500/db_bookrental?createDatabaseIfNotExist=true
    username: root
    password: mysql
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8002

eureka:
  client:
    service-url:
      defaultZone: http://127.0.0.1:9001/eureka/

  instance:
    instance-id: ${spring.application.name}:${random.value}
